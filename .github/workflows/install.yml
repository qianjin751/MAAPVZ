name: install

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MFAA_VERSION: v2.12.1
  MAA_FRAMEWORK_VERSION: v5.10.4

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check for release keyword
        id: check_keyword
        if: github.event_name == 'push'
        run: |
          # 只检查第一行，避免 PR 合并时带入描述
          FIRST_LINE=$(echo "${{ github.event.head_commit.message }}" | head -n1)
          if echo "$FIRST_LINE" | grep -qE "\[release-stable\]|#release-stable"; then
            echo "release_type=stable" >> $GITHUB_OUTPUT
          elif echo "$FIRST_LINE" | grep -qE "\[release\]|#release"; then
            echo "release_type=test" >> $GITHUB_OUTPUT
          else
            echo "release_type=none" >> $GITHUB_OUTPUT
          fi

      - id: set_tag
        run: |
          # 判断是否为标签推送（支持 v*, 正式版*, 测试版*）
          is_release=${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/正式版') || startsWith(github.ref, 'refs/tags/测试版') }}

          if $is_release; then
            # 推送的是标签，直接使用标签名
            tag="${GITHUB_REF#refs/tags/}"
          else
            # 非标签触发：检查关键词
            RELEASE_TYPE="${{ steps.check_keyword.outputs.release_type }}"
            short_hash=$(git rev-parse --short HEAD | tr 'a-z' 'A-Z')
            if [[ "$RELEASE_TYPE" == "stable" ]]; then
              is_release=true
              is_prerelease=false
              tag="正式版-$(date +%y%m%d)"
            elif [[ "$RELEASE_TYPE" == "test" ]]; then
              is_release=true
              is_prerelease=true
              tag="测试版-$(date +%y%m%d)-${short_hash}"
            else
              # 无关键词：生成 CI 标记但不会发布
              tag="ci-$(date +%y%m%d)-${short_hash}"
            fi
          fi

          # 如果 is_prerelease 尚未设置，按标签名自动判断
          if [[ -z "$is_prerelease" ]]; then
            is_prerelease=false
            if [[ $tag =~ 测试版 ]]; then
              is_prerelease=true
            fi
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: win
            arch: x86_64
            runner: windows-latest
          - os: win
            arch: aarch64
            runner: windows-11-arm
          - os: macos
            arch: x86_64
            runner: ubuntu-latest
          - os: macos
            arch: aarch64
            runner: ubuntu-latest
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: aarch64
            runner: ubuntu-latest
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v6   
        with:
          python-version: "3.12"

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ env.MAA_FRAMEWORK_VERSION }}
          out-file-path: "deps"
          extract: true

      - name: Debug deps content
        shell: bash
        run: |
          echo "Current directory:"
          pwd
          echo "deps directory content:"
          ls -la deps/
          echo "deps/bin exists? $([ -d deps/bin ] && echo YES || echo NO)"

      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          tag: ${{ env.MFAA_VERSION }}
          out-file-path: "MFA"
          extract: true

      - name: Modify MFAAvalonia exe icon
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          curl -L https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe
          ./rcedit.exe "MFA/MFAAvalonia.exe" --set-icon "docs/imgs/logo.ico"

      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFAAvalonia."

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Setup Embed Python
        if: matrix.os != 'linux' && matrix.os != 'android'
        shell: bash
        run: |
          python tools/ci/setup_embed_python.py ${{ matrix.os }} ${{ matrix.arch }}
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            EMBED_PYTHON_PATH="./install/python/bin/python3"
            if [ -f "$EMBED_PYTHON_PATH" ]; then
              chmod +x "$EMBED_PYTHON_PATH"
            else
              echo "Warning: Embedded Python executable not found at $EMBED_PYTHON_PATH. Skipping chmod."
            fi
          fi

      - name: Fix permissions on unix
        if: matrix.os != 'win'
        shell: bash
        run: |
          if [ -d "./install/python/bin" ]; then
            chmod +x ./install/python/bin/* 2>/dev/null || true
          fi
          if [ -d "./install" ]; then
            find ./install -type f -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
          fi

      - name: Install on unix
        if: matrix.os != 'win'
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              echo "Copying MFA files to install directory..."
              mkdir -p install
              rsync -av --ignore-existing MFA/ install/
              echo "MFA files copied successfully."
            else
              echo "MFA directory not found, skipping copy."
            fi
          else
            echo "Skipping copy MFA for Android."
          fi

          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - name: Install on windows
        if: matrix.os == 'win'
        shell: bash
        run: |
          echo "=== Debug before install.py ==="
          ls -la deps/
          ls -la deps/bin/ || echo "deps/bin not found"
          echo "=== End debug ==="

          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              echo "Copying MFA files to install directory..."
              mkdir -p install
              cp -r MFA/* install/
              echo "MFA files copied successfully."
            else
              echo "MFA directory not found, skipping copy."
            fi
          else
            echo "Skipping copy MFA for Android."
          fi

          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - name: Download Python dependencies on Windows
        if: matrix.os == 'win'
        shell: bash
        run: |
          python tools/ci/download_deps.py --deps-dir ./install/python/Lib/site-packages --os ${{ matrix.os }} --arch ${{ matrix.arch }}

      - name: Download Python dependencies on macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          python tools/ci/download_deps.py --deps-dir ./install/python/lib/python3.12/site-packages --os ${{ matrix.os }} --arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: MaaPVZ-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        if: false
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}